name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Type check
        run: uv run mypy --strict src

      - name: Build wheel
        run: uv build --wheel

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
